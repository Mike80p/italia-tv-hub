name: Aggiorna Italia TV Hub

on:
  workflow_dispatch:
  schedule:
    # Aggiornamento ogni 6 ore.
    # Gli orari cron di GitHub Actions sono espressi in UTC.
    - cron: "17 */6 * * *"

permissions:
  contents: write

concurrency:
  group: aggiorna-italia-tv-hub
  cancel-in-progress: false

jobs:
  generate:
    name: Genera e pubblica playlist
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Scarica repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Esegui test
        run: |
          python -m pytest -q

      - name: Genera playlist e report
        run: |
          python -m src.main

      - name: Verifica output
        shell: bash
        run: |
          test -s output/playlist.m3u
          test -s output/report.json

          first_line="$(head -n 1 output/playlist.m3u | tr -d '\r')"

          if [[ "$first_line" != "#EXTM3U"* ]]; then
            echo "Errore: output/playlist.m3u non inizia con #EXTM3U."
            exit 1
          fi

          channel_count="$(grep -c '^#EXTINF:' output/playlist.m3u || true)"

          if [[ "$channel_count" -lt 1 ]]; then
            echo "Errore: la playlist non contiene canali."
            exit 1
          fi

          echo "Canali generati: $channel_count"

      - name: Pubblica output nel branch main
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -f output/playlist.m3u
          git add -f output/report.json

          if [[ -f output/health.json ]]; then
            git add -f output/health.json
          fi

          if git diff --cached --quiet; then
            echo "Nessuna modifica da pubblicare."
            exit 0
          fi

          git commit -m "Aggiornamento automatico playlist"

          git pull --rebase origin main
          git push origin HEAD:main
